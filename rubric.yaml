# Soft-dimension weights and insertion threshold.
# Weights must sum to 1.0. Edit freely — the pipeline reads this at runtime.

threshold: 0.75          # minimum fit_score for Notion insertion
near_miss_min: 0.65      # floor for near-miss logging (0.65–0.74)

dimensions:
  cause_mission_fit:
    weight: 0.25
    description: Alignment with EA cause areas (global health & development, etc.)

  role_function_fit:
    weight: 0.25
    description: Match on job function (data leadership, M&E, analytics, BI)

  location_compatibility:
    weight: 0.15
    description: Remote/hybrid/on-site compatibility with Sweden / Sundsvall

  seniority_match:
    weight: 0.10
    description: Role seniority consistent with ~10+ years experience and AD-level scope

  comp_adequacy:
    weight: 0.10
    description: Compensation adequacy including tjänstepension replicability flag

  values_alignment:
    weight: 0.10
    description: Org culture and mission consonant with EA values and effective giving

  skill_growth:
    weight: 0.05
    description: Opportunity to close acknowledged gaps (AI/automation, fundraising analytics)
