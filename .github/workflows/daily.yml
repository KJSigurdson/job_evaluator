# EA Job Evaluator — daily pipeline (multi-user)
#
# Runs automatically at 06:00 UTC every day.
# Scrapes EA job boards once, scores each Supabase-registered user's shared pool
# against their own profile/weights, and upserts matches into Supabase per user.
# State (seen-cache) lives in the Supabase `seen` table — nothing is committed back
# to the repo.
#
# Manual trigger (Actions → Run workflow):
#   dry_run       = false  →  full run, writes matches + seen to Supabase
#   dry_run       = true   →  scrape + score only, prints would-be matches, no writes
#   limit         = N      →  cap the shared postings pool to N (useful for smoke-testing)
#   only_user_id  = <uuid> →  one-off run scoped to a single user; writes running/complete/
#                             failed status to search_quota for that user (skipped in dry-run)

name: Daily pipeline

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC — off-peak, avoids midnight-UTC drop rate
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (scrape + score only, no seen/matches writes)"
        type: boolean
        default: false
      limit:
        description: "Cap the shared postings pool (leave empty for no cap)"
        type: string
        default: ""
      only_user_id:
        description: "One-off run scoped to a single user_id (leave empty for the normal multi-user run)"
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false   # never cancel a running pipeline; queue instead

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:                ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:   ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          IAP_SHEET_ID:                ${{ secrets.IAP_SHEET_ID }}
          IAP_SHEET_TAB:               ${{ secrets.IAP_SHEET_TAB }}
          ALGOLIA_APP_ID:              ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_API_KEY:             ${{ secrets.ALGOLIA_API_KEY }}
          ALGOLIA_INDEX_80K:           ${{ secrets.ALGOLIA_INDEX_80K }}
          TIER1_MODEL:                 ${{ secrets.TIER1_MODEL }}
          TIER2_MODEL:                 ${{ secrets.TIER2_MODEL }}
          RECENCY_DAYS:                ${{ secrets.RECENCY_DAYS }}
        run: |
          ARGS=""
          [ "${{ inputs.dry_run }}" = "true" ]   && ARGS="$ARGS --dry-run"
          [ -n "${{ inputs.limit }}" ]           && ARGS="$ARGS --limit ${{ inputs.limit }}"
          [ -n "${{ inputs.only_user_id }}" ]    && ARGS="$ARGS --only-user-id ${{ inputs.only_user_id }}"
          python -m src.pipeline $ARGS
